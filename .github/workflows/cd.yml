name: CD

on:
  push:
    tags:
     - 'v*'
    
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Install and run smoke tests
        run: |
          pip install pytest
          pytest tests/ -v -k 'happy_path'

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
      