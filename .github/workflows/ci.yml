name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: checkout to a repository
        uses: actions/checkout@v4
 
      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Install dependecies
        run: pip install pytest flake8 safety

      - name: run the tests
        run: pytest -q
      
      - name: Security scan
        run: pip install bandit

